# Cross-interview pattern analysis from 3 switch analyses

analysis_date: 2026-04-15
switch_files_analyzed: 3

clusters:
  - job: "Get reliable numbers to leadership without being the bottleneck"
    frequency: 3/3
    common_push: "Existing tools fail or produce conflicting data at critical moments"
    common_pull: "Self-serve, real-time dashboards that leadership trusts"
    key_quotes:
      - "I literally couldn't tell my CEO what our numbers were" # Sarah
      - "I dreaded board meetings because I knew the numbers would be stale" # Mike
      - "We spent 2 weeks arguing about what success looks like" # Lisa

  - job: "Stop compensating for bad tooling with manual workarounds"
    frequency: 2/3
    common_push: "Teams build fragile workarounds around tool limitations"
    common_pull: "Tool that works well enough to eliminate the workaround layer"
    key_quotes:
      - "His entire workflow was built around compensating for the old tool's problems" # Sarah
      - "We had 2 years of custom scripts that 'just worked' — ugly but functional" # Mike

force_patterns:
  strongest_push: "Data unavailability or inconsistency during high-stakes moments (board meetings, month-end, launches)"
  strongest_pull: "Self-serve access to trusted data, eliminating human bottlenecks"
  strongest_anxiety: "Data migration risk and team adoption resistance"
  strongest_habit: "Existing workarounds, custom scripts, and personal spreadsheets"

evidence_gaps:
  - "Habit forces are thin — only 2/3 interviews deeply probed current-tool attachment"
  - "No interviews with end-users (the people viewing dashboards), only with buyers/implementers"
  - "Price sensitivity not explored — Lisa mentioned startup pricing but others didn't discuss cost"

recommendations:
  - "The job is about credibility with leadership, not about dashboards. Position around 'never be caught without an answer again.'"
  - "Data migration anxiety is the #1 blocker. Address it head-on in onboarding (test imports, migration guarantee)."
  - "Interview 2-3 end-users (people who view dashboards but didn't make the buying decision) to understand the consumption experience."
